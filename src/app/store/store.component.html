<div class="store-page">
    <div class="title-container">
        <h1>
             Products
        </h1>
        <div class="options-container">
            <img 
                src="src/app/icons/cart.svg"
                class="icon"
                (click)="openCart()"
                >
            <img src="src/app/icons/search.svg" class="icon">
            <h2
                *ngIf="!isLoggedIn()"
                (click)="goToLogin()"
                >
            Log In
            </h2>
            <h2
                *ngIf="!isLoggedIn()"
                (click)="goToSignup()"
                >
            Sign Up
            </h2>
            <h2 
                *ngIf="isLoggedIn()"
                (click)="logOut()"
                >
            Log out
            </h2>
            <h2 
                *ngIf="isLoggedIn()"
                (click)="goToAnalyticsPanel()"
                >
            Analytics
            </h2>
        </div>
        <div class="options-container" *ngIf="isJanitor()">
            <h2
                (click)="goToProductSubmit()"
            >
                New
            </h2>
            <img
                src="src/app/icons/settings.svg"
                class="icon"
                (click)="goToAdminPanel()"
            >
        </div>
    </div>
    <div class="product-container">
        <mat-card *ngFor="let product of products" class="product-card">
            <mat-card-header>
                <mat-card-title
                    (click)="openDetails(product._id, product.Name, product.Price, product.Description, product.Image, product.Sales, product.Stock, product.Upcharge, product.Supplies, product.Reviews)"
                >
                    {{ product.Name }}
                </mat-card-title>
                <mat-card-subtitle>
                    ${{ product.Price }}
                </mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <img src="{{ product.Image }}" class="product-image">
            </mat-card-content>
            <p>Sales: {{ product.Sales }}</p>
            <p>{{ product.Stock }} in stock</p>
            <mat-card-actions>
                <button
                    class="button"
                    (click)="addItemToCart(product._id)"
                >
                    Add to cart
                </button>
                <button
                    class="button"
                    (click)="addItemToWishlist(product._id)"
                >
                    Wishlist
                </button>
            </mat-card-actions>
        </mat-card>

    </div>
</div>
